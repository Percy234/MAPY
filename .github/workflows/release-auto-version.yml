name: Release Auto Version

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Detect release bump label
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || [])
              .map(label => label.name.toLowerCase());

            let bump = '';
            if (labels.includes('release:major')) bump = 'major';
            else if (labels.includes('release:minor')) bump = 'minor';
            else if (labels.includes('release:patch')) bump = 'patch';

            if (!bump) {
              core.notice('No release label found. Expected one of: release:major, release:minor, release:patch.');
              core.setOutput('skip', 'true');
              return;
            }

            core.info(`Using bump type: ${bump}`);
            core.setOutput('skip', 'false');
            core.setOutput('type', bump);

      - name: Skip when PR is not a release PR
        if: steps.bump.outputs.skip == 'true'
        run: echo "No release label, skipping auto release versioning."

      - name: Bump version in pubspec.yaml
        if: steps.bump.outputs.skip != 'true'
        run: |
          chmod +x scripts/bump_pubspec_version.sh
          scripts/bump_pubspec_version.sh "${{ steps.bump.outputs.type }}"

      - name: Read new versions
        if: steps.bump.outputs.skip != 'true'
        id: ver
        run: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          APP_VERSION=${FULL_VERSION%%+*}
          BUILD_NUMBER=${FULL_VERSION##*+}
          echo "full=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        if: steps.bump.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        if: steps.bump.outputs.skip != 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build release APK
        if: steps.bump.outputs.skip != 'true'
        run: |
          flutter --version
          flutter pub get
          flutter build apk --release

          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk "artifacts/mapy-v${{ steps.ver.outputs.app }}-build${{ steps.ver.outputs.build }}.apk"

      - name: Commit bumped version
        if: steps.bump.outputs.skip != 'true'
        run: |
          if git diff --quiet pubspec.yaml; then
            echo "No changes detected in pubspec.yaml"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore(release): v${{ steps.ver.outputs.full }}"
          git push origin HEAD:main

      - name: Create and push release tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="v${{ steps.ver.outputs.app }}"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists on origin"
            exit 1
          fi

          git tag -a "${TAG}" -m "Release ${TAG} (${{ steps.ver.outputs.full }})"
          git push origin "${TAG}"

      - name: Publish GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.app }}
          name: Release v${{ steps.ver.outputs.app }}
          generate_release_notes: true
          files: |
            artifacts/mapy-v${{ steps.ver.outputs.app }}-build${{ steps.ver.outputs.build }}.apk
